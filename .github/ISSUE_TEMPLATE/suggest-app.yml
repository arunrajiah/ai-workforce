name: "🚀 Suggest an AI-native app"
description: Suggest an open-source, AI-native app to add to a department or industry
title: "[App]: "
labels: ["app-suggestion", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping grow the directory! The bar is **open-source + AI-native**
        (an LLM or AI agent at the core). See [REVIEWING.md](../blob/main/REVIEWING.md)
        for exactly how entries are reviewed.
  - type: input
    id: repo
    attributes:
      label: GitHub repository URL
      placeholder: https://github.com/owner/repo
    validations:
      required: true
  - type: input
    id: stars
    attributes:
      label: Approximate stars
      placeholder: "~12k"
    validations:
      required: true
  - type: dropdown
    id: placement
    attributes:
      label: Where does it belong?
      options:
        - "Department — Sales"
        - "Department — Marketing"
        - "Department — Support"
        - "Department — HR"
        - "Department — Finance"
        - "Department — Legal"
        - "Department — Engineering"
        - "Department — Data"
        - "Department — Design"
        - "Department — Operations"
        - "Department — Product"
        - "Department — Executive"
        - "Industry (say which in the description)"
    validations:
      required: true
  - type: input
    id: replaces
    attributes:
      label: What role or SaaS does it replace?
      placeholder: an SDR + a $99/mo outreach tool
    validations:
      required: true
  - type: textarea
    id: ai
    attributes:
      label: Why is it AI-native?
      description: What is the LLM / AI agent / ML model doing at its core? (Not "a normal app with an AI feature.")
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Honest assessment
      description: Strengths AND rough edges. Trust is the whole point of this list.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Quality bar (all required)
      options:
        - label: It is **AI-native** — an LLM/agent/model is at its core
          required: true
        - label: It is **open source** with a real license
          required: true
        - label: It is **self-hostable**
          required: true
        - label: A team could **ship it in ~a day or less**
          required: true
        - label: I verified the repo link resolves and the star count is roughly right
          required: true
