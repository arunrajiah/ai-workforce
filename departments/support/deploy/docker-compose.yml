# Customer Support — the whole department in one command.
#
#   Chatwoot (omnichannel helpdesk)  +  AI Support Agent (auto-answers tickets)
#   +  Caddy (automatic HTTPS)  +  Postgres/pgvector  +  Redis
#
# First run (creates the database), then start everything:
#   docker compose run --rm rails bundle exec rails db:chatwoot_prepare
#   docker compose up -d
#
# See GO-LIVE.md for the full walkthrough (domain, DNS, first login, connecting the bot).

x-chatwoot: &chatwoot
  image: chatwoot/chatwoot:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-chatwoot}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data

  rails:
    <<: *chatwoot
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    expose:
      - "3000"

  sidekiq:
    <<: *chatwoot
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  ai-support-agent:
    build: ../../../apps/ai-support-agent
    restart: unless-stopped
    environment:
      # LLM: leave blank for offline demo, or point at any OpenAI-compatible endpoint.
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # Chatwoot: lets the bot post replies back into conversations.
      CHATWOOT_BASE_URL: http://rails:3000
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN:-}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-}
    volumes:
      - ./knowledge:/app/knowledge:ro
    depends_on:
      - rails

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rails

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
